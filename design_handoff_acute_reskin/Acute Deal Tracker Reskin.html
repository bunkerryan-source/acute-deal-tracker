<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Acute Deal Tracker — Bureau Reskin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  :root {
    --font-ui: "DM Sans", system-ui, -apple-system, sans-serif;
  }
  body { background: #d8d2c4; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
    20%, 40%, 60%, 80% { transform: translateX(4px); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tracker-rows.jsx"></script>
<script type="text/babel" src="tracker-shell.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentIntensity": "balanced"
}/*EDITMODE-END*/;

const ACCENT_MAP = {
  "muted":    "#a64018",
  "balanced": "#BF4A20",
  "vivid":    "#d2542a"
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = ACCENT_MAP[tweaks.accentIntensity] || ACCENT_MAP.balanced;

  return (
    <>
      <DesignCanvas
        title="Acute Deal Tracker — Bureau reskin"
        subtitle="Visual reskin against the real components · Stone canvas · Navy chrome · Terra accent"
      >
        <DCSection id="screens" title="Screens">
          <DCArtboard id="board" label="Task board — main view" width={1200} height={900}>
            <AppShell accent={accent} />
          </DCArtboard>
          <DCArtboard id="auth" label="Password gate" width={1200} height={900}>
            <PasswordScreen onUnlock={() => {}} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent intensity" subtitle="Terra is the only accent. Tune how loud it gets.">
          <TweakRadio
            value={tweaks.accentIntensity}
            onChange={(v) => setTweak("accentIntensity", v)}
            options={[
              { value: "muted", label: "Muted" },
              { value: "balanced", label: "Brand" },
              { value: "vivid", label: "Vivid" },
            ]}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            {Object.entries(ACCENT_MAP).map(([k, v]) => (
              <div key={k} style={{ flex: 1, height: 22, borderRadius: 4, background: v, opacity: tweaks.accentIntensity === k ? 1 : 0.45, border: tweaks.accentIntensity === k ? "1.5px solid #0E1E3A" : "1.5px solid transparent" }} />
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
